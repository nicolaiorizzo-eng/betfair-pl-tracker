name: Betfair Sync

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allows you to trigger manually if needed

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/checkout@v3
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests pandas

    - name: Run Fetcher
      env:
        BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
        BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
        BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
      run: python fetch_pl.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "Automation Bot"
        git config --global user.email "bot@github.com"
        git add betfair_history.csv
        git commit -m "Automated update: $(date -u +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push